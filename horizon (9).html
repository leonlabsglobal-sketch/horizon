<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDtNxq2QAVQWEWLeYDX_jYHvVzySWCSHpA",
    authDomain: "horizon-app-36689.firebaseapp.com",
    databaseURL: "https://horizon-app-36689-default-rtdb.firebaseio.com",
    projectId: "horizon-app-36689",
    storageBucket: "horizon-app-36689.firebasestorage.app",
    messagingSenderId: "46657774312",
    appId: "1:46657774312:web:4fcc929454f67a8c535f5d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dataRef = ref(db, 'horizon');

  // Expose to global scope for use in main script
  window._fbRef = dataRef;
  window._fbSet = set;
  window._fbOnValue = onValue;
  window._fbReady = true;

  // Listen for remote changes
  onValue(dataRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    // Only update if change came from the other person (not our own save)
    if (window._suppressRemote) return;
    if (data.accounts) window.S.accounts = data.accounts;
    if (data.income) window.S.income = data.income;
    if (data.expenses) window.S.expenses = data.expenses;
    if (data.pots) window.S.pots = data.pots;
    if (data.pending !== undefined) window.S.pending = data.pending;
    window.renderAll();
  });
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ff:'DM Sans',sans-serif;
  --fs:'Playfair Display',Georgia,serif;
  --t1:rgba(255,255,255,.92);
  --t2:rgba(255,255,255,.55);
  --t3:rgba(255,255,255,.3);
  --bd:rgba(255,255,255,.15);
  --gl:rgba(255,255,255,.09);
  --gl2:rgba(255,255,255,.16);
  --gr:#4CD98A;--grg:rgba(76,217,138,.13);--grb:rgba(76,217,138,.32);
  --wa:#F5924E;--wag:rgba(245,146,78,.13);--wab:rgba(245,146,78,.32);
  --am:#F5C842;--amg:rgba(245,200,66,.13);--amb:rgba(245,200,66,.32);
}
html,body{height:100%;font-family:var(--ff);color:var(--t1);-webkit-font-smoothing:antialiased;background:#080c10;}
.app{max-width:390px;margin:0 auto;height:100%;height:100dvh;overflow:hidden;position:relative;}

/* ── FULL-BLEED PHOTO BACKGROUND ── */
.bg{
  position:fixed;inset:0;max-width:390px;margin:0 auto;z-index:0;
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
}
/* Dark gradient overlay — sits above the photo */
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,8,.42) 0%,rgba(0,0,8,.28) 55%,rgba(0,0,8,.52) 100%);
  pointer-events:none;
}

.sc{display:none;flex-direction:column;height:100%;overflow:hidden;position:relative;z-index:1;}
.sc.on{display:flex;}

/* ── HOME ── */
.home-hero{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:0 24px 6px;min-height:0;}
.home-topbar{display:flex;justify-content:space-between;align-items:flex-start;padding-top:44px;position:relative;z-index:2;margin-bottom:4px;}
.topbar-btns{display:flex;gap:8px;padding-top:2px;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .15s;color:var(--t1);
}
.icon-btn.gr{color:var(--gr);background:var(--grg);border-color:var(--grb);}
.icon-btn.wa{color:var(--wa);background:var(--wag);border-color:var(--wab);}
.home-greeting{font-family:var(--fs);font-weight:300;font-size:min(40px,10.5vw);letter-spacing:-.02em;line-height:1.1;position:relative;z-index:2;margin-bottom:8px;color:var(--t1);}
.day-dots{display:flex;gap:12px;position:relative;z-index:2;margin-bottom:0;}
.day-item{display:flex;flex-direction:column;align-items:center;gap:4px;}
.day-lbl{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase;}
.day-dot{width:4px;height:4px;border-radius:50%;}
.day-dot.past{background:rgba(255,255,255,.5);}
.day-dot.today{background:var(--gr);}
.day-dot.future{background:rgba(255,255,255,.14);}
.home-ghost{position:absolute;right:-16px;top:50%;transform:translateY(-40%);font-size:min(250px,65vw);font-family:var(--fs);font-weight:300;line-height:.9;color:rgba(255,255,255,.06);pointer-events:none;user-select:none;z-index:0;letter-spacing:-.05em;}
.home-status{position:relative;z-index:2;padding-bottom:20px;margin-top:auto;}
.status-pre{font-size:12px;color:var(--t2);letter-spacing:.05em;margin-bottom:6px;}
.status-date{font-family:var(--fs);font-weight:300;font-size:min(38px,10vw);letter-spacing:-.02em;line-height:1.08;margin-bottom:14px;color:var(--t1);}
.status-row{display:flex;align-items:center;gap:12px;}

/* ACCOUNT STRIPS */
.acct-strips{padding:0 20px 10px;position:relative;z-index:1;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.acct-strip{display:flex;justify-content:space-between;align-items:center;padding:10px 0;}
.acct-strip+.acct-strip{border-top:1px solid rgba(255,255,255,.1);}
.acct-name{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);}
.acct-bal{font-size:14px;font-weight:500;color:var(--t1);}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.pgr{background:var(--grg);color:var(--gr);border:1px solid var(--grb);}
.pam{background:var(--amg);color:var(--am);border:1px solid var(--amb);}
.pwa{background:var(--wag);color:var(--wa);border:1px solid var(--wab);}
.dot{width:4px;height:4px;border-radius:50%;background:currentColor;display:inline-block;}

/* ── GLASS CHIP — universal button style ── */
.chip{
  display:inline-flex;align-items:center;gap:7px;
  padding:12px 14px;border-radius:14px;
  border:1px solid var(--bd);
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  color:var(--t1);font-size:14px;font-family:var(--ff);font-weight:500;
  cursor:pointer;transition:all .15s;
}
.chip:active{opacity:.75;transform:scale(.97);}
.chip-sm{padding:7px 12px;font-size:12px;border-radius:10px;}
.chip-full{width:100%;justify-content:center;padding:15px;border-radius:16px;font-size:15px;}
.chip-solid{background:rgba(255,255,255,.88);color:rgba(0,0,0,.85);border-color:rgba(255,255,255,.95);font-weight:600;backdrop-filter:none;-webkit-backdrop-filter:none;}
.chip-gr{background:var(--grg);border-color:var(--grb);color:var(--gr);}
.chip-wa{background:var(--wag);border-color:var(--wab);color:var(--wa);}

.home-actions{padding:0 20px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* WEEK CHIPS */
.home-upcoming{padding:0 20px 8px;flex-shrink:0;}
.upcoming-label{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.chips3{display:flex;gap:8px;}
.wchip{
  flex:1;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid var(--bd);
  border-radius:14px;padding:13px 10px;
  cursor:pointer;display:flex;flex-direction:column;gap:6px;
  transition:all .18s;min-width:0;
}
.wchip.on{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3);}
.wchip-label{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wchip-amt{font-size:11px;color:var(--t3);}
.wdetail{
  display:none;margin-top:8px;
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid var(--bd);border-radius:14px;padding:14px 16px;
}
.wdetail.on{display:block;}
.wdrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.wdrow+.wdrow{border-top:1px solid rgba(255,255,255,.08);}
.home-next{padding:4px 20px 0;flex-shrink:0;}
.next-strip{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid rgba(255,255,255,.1);}

/* ── NAV — glass pill, soft active indicator ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;z-index:50;padding:8px 20px 24px;}
.ni{
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border:1px solid rgba(255,255,255,.2);
  border-radius:28px;display:flex;padding:5px;
  box-shadow:0 8px 40px rgba(0,0,0,.25);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 4px;cursor:pointer;color:rgba(255,255,255,.38);
  font-size:9px;letter-spacing:.07em;text-transform:uppercase;
  border-radius:18px;transition:all .2s;user-select:none;font-family:var(--ff);
}
.nb i{font-size:19px;}
.nb span{font-size:9px;}
/* Soft white pill — not a solid block */
.nb.on{
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.28);
  color:rgba(255,255,255,.95);
}

/* ── OTHER SCREENS ── */
.screen-pad{padding:52px 20px 20px;}
.screen-title{font-size:36px;font-weight:300;font-family:var(--fs);margin-bottom:6px;letter-spacing:-.02em;color:var(--t1);}
.screen-sub{font-size:14px;color:var(--t2);margin-bottom:20px;}

/* GLASS CARDS */
.glass{
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,.15);
  border-radius:16px;padding:18px 20px;
}
.glass-sm{
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,.15);
  border-radius:12px;padding:14px 16px;
}
.btr{height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;}
.bfill{height:100%;border-radius:2px;transition:width .6s;}

/* FORECAST CARDS */
.fwc{
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,.15);
  border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;
}
.fwc.open{border-color:rgba(255,255,255,.32);}
.fwh{padding:15px 18px;}
.fwb{display:none;border-top:1px solid rgba(255,255,255,.1);padding:12px 18px 14px;background:rgba(0,0,0,.12);}
.fwb.on{display:block;}
.fwr{display:flex;justify-content:space-between;padding:4px 0;}

/* TABS */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:0 20px 16px;scrollbar-width:none;position:sticky;top:0;z-index:10;padding-top:8px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  padding:7px 16px;border-radius:20px;font-size:12px;cursor:pointer;
  color:var(--t2);border:1px solid rgba(255,255,255,.15);
  white-space:nowrap;
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(12px) saturate(180%);
  -webkit-backdrop-filter:blur(12px) saturate(180%);
  font-weight:500;transition:all .15s;
}
.tab.on{color:var(--t1);border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.18);font-weight:600;}

.ar{display:flex;align-items:center;gap:14px;padding:13px 16px;}
.ar+.ar{border-top:1px solid rgba(255,255,255,.08);}
.ad{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.ov.on{display:flex;}
.mbox{
  background:rgba(12,14,20,.88);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border:1px solid rgba(255,255,255,.16);
  border-radius:24px 24px 0 0;padding:24px 20px;
  width:100%;max-width:390px;max-height:90vh;overflow-y:auto;
}
.mh{width:32px;height:3px;background:rgba(255,255,255,.22);border-radius:2px;margin:0 auto 22px;}

/* INPUTS */
.inp{
  width:100%;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(12px) saturate(180%);
  -webkit-backdrop-filter:blur(12px) saturate(180%);
  border:1px solid rgba(255,255,255,.2);
  border-radius:10px;color:var(--t1);font-family:var(--ff);
  font-size:14px;padding:12px 14px;outline:none;transition:border-color .15s;
}
.inp:focus{border-color:rgba(255,255,255,.42);}
.inp::placeholder{color:rgba(255,255,255,.3);}
select.inp option{background:rgba(15,18,28,.97);}

.lbl{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;}
.sh{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;padding:0 20px;margin-bottom:12px;}
.r{display:flex;justify-content:space-between;align-items:center;}
.c{display:flex;flex-direction:column;}
.g4{gap:4px;}.g8{gap:8px;}.g12{gap:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.toggle-row{display:flex;gap:6px;}
.toggle-opt{
  flex:1;padding:10px 8px;border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:var(--t2);font-size:13px;font-family:var(--ff);cursor:pointer;text-align:center;transition:all .15s;
}
.toggle-opt.on{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.32);color:var(--t1);}
</style>
</head>
<body>
<div class="app">
<div class="bg" id="bg"></div>

<!-- HOME -->
<div id="sc-home" class="sc on" style="padding-bottom:88px;">
  <div class="home-hero">
    <div class="home-topbar">
      <div></div>
      <div class="topbar-btns" style="align-items:center;gap:8px;"><div id="sync-dot" title="Sync status" style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0;transition:background .4s;"></div>
        <button class="icon-btn gr" onclick="openModal('mi')" title="Money In"><i class="ti ti-arrow-down-circle"></i></button>
        <button class="icon-btn wa" onclick="openModal('mo')" title="Money Out"><i class="ti ti-arrow-up-circle"></i></button>
        <button class="icon-btn" onclick="openModal('bg-picker')" title="Background" style="color:rgba(255,255,255,.5);"><i class="ti ti-photo"></i></button>
      </div>
    </div>
    <p class="home-greeting" id="hgreeting">Good morning</p>
    <p id="haction" style="font-size:13px;letter-spacing:.02em;margin-top:8px;display:none;position:relative;z-index:2;"></p>
    <div class="acct-strips" id="haccts"></div>
  </div>

  <div class="home-upcoming">
    <p class="upcoming-label">upcoming</p>
    <div class="chips3" id="hwks"></div>
    <div class="wdetail" id="wdetail"></div>
  </div>
  <div class="home-next" id="hinc"></div>
</div>

<!-- FORECAST -->
<div id="sc-forecast" class="sc" style="overflow-y:auto;padding-bottom:120px;">
  <div class="screen-pad">
    <p class="screen-title">Forecast</p>
    <p class="screen-sub">Week by week — will I still have money?</p>
    <div class="glass" style="margin-bottom:20px;">
      <div class="r" style="margin-bottom:10px;"><p class="lbl">8-week closing balance</p><p style="font-size:20px;font-weight:400;font-family:var(--fs);" id="fcend">—</p></div>
      <div class="btr" style="margin-bottom:10px;"><div class="bfill" id="fcbar"></div></div>
      <p style="font-size:13px;color:var(--t2);" id="fcnote"></p>
    </div>
  </div>
  <p class="sh">week by week</p>
  <div style="padding:0 20px;display:flex;flex-direction:column;gap:8px;" id="fcwks"></div>
</div>

<!-- ALLOCATE -->
<div id="sc-allocate" class="sc" style="overflow-y:auto;padding-bottom:120px;">
  <div class="screen-pad">
    <p class="screen-title">Allocate</p>
    <p class="screen-sub">What should I do with this payment?</p>
  </div>
  <div style="padding:0 20px;display:flex;flex-direction:column;gap:14px;" id="alc"></div>
</div>

<!-- MANAGE -->
<div id="sc-manage" class="sc" style="overflow-y:auto;padding-bottom:120px;">
  <div class="screen-pad">
    <p class="screen-title">Manage</p>
    <p class="screen-sub" style="margin-bottom:0;">Your rules and balances</p>
  </div>
  <div class="tabs" style="margin-top:16px;">
    <div class="tab on" onclick="mt('accounts',this)">Accounts</div>
    <div class="tab" onclick="mt('pots',this)">Pots</div>
    <div class="tab" onclick="mt('income',this)">Income</div>
    <div class="tab" onclick="mt('expenses',this)">Expenses</div>
  </div>
  <div style="padding:0 20px;display:flex;flex-direction:column;gap:10px;" id="mgc"></div>
</div>

<nav class="nav"><div class="ni">
  <div class="nb on" id="nav-home" onclick="go('home')"><i class="ti ti-home"></i><span>Home</span></div>
  <div class="nb" id="nav-forecast" onclick="go('forecast')"><i class="ti ti-trending-up"></i><span>Forecast</span></div>
  <div class="nb" id="nav-allocate" onclick="go('allocate')"><i class="ti ti-wallet"></i><span>Allocate</span></div>
  <div class="nb" id="nav-manage" onclick="go('manage')"><i class="ti ti-adjustments-horizontal"></i><span>Manage</span></div>
</div></nav>
</div>

<div class="ov" id="modal" onclick="mbg(event)"><div class="mbox"><div class="mh"></div><div id="mbody"></div></div></div>

<script>
window.S = window.S || {};
const S=window.S;
Object.assign(S,{
  accounts:[],
  income:[],
  expenses:[],
  pots:[],
  pending:null,
  mgTab:'accounts',
  openChip:-1
});

// Background URL — loaded from localStorage or default
let BG_URL = localStorage.getItem('hz_bg') || 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80';

function applyBg(url){
  BG_URL = url;
  localStorage.setItem('hz_bg', url);
  document.getElementById('bg').style.backgroundImage = 'url(' + url + ')';
}

const BG_PRESETS = [
  {label:'Mountain lake',url:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80'},
  {label:'Ocean horizon',url:'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=800&q=80'},
  {label:'Misty forest',url:'https://images.unsplash.com/photo-1448375240586-882707db888b?w=800&q=80'},
  {label:'Desert dunes',url:'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=800&q=80'},
  {label:'Northern lights',url:'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=800&q=80'},
  {label:'City at night',url:'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80'},
  {label:'Calm sea',url:'https://images.unsplash.com/photo-1505459668311-8dfac7952bf0?w=800&q=80'},
  {label:'Autumn road',url:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80'},
];

const fmt=n=>Math.round(n).toLocaleString('en-GB');
const fmtD=d=>new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
const fmtDs=d=>new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const td=()=>new Date().toISOString().split('T')[0];
const N=()=>new Date();
const greet=()=>{const h=N().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';};
const greetSmall=()=>{const h=N().getHours();return h<12?'good morning':h<18?'good afternoon':'good evening';};
const meOut=()=>S.expenses.reduce((a,e)=>a+e.amount,0);
const totalBal=()=>S.accounts.reduce((a,ac)=>a+ac.balance,0);
const burn=()=>meOut()/30;
const runway=()=>{const b=burn();return b>0?Math.floor(totalBal()/b):999;};
const runwayDt=()=>{const d=new Date();d.setDate(d.getDate()+runway());return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});};
const status=()=>{const d=runway();return d>30?'gr':d>7?'am':'wa';};
const acctExpenses=id=>S.expenses.filter(e=>e.accountId===id).reduce((a,e)=>a+e.amount,0);
const acctCovered=ac=>ac.balance>=acctExpenses(ac.id);
const acctShort=ac=>Math.max(0,acctExpenses(ac.id)-ac.balance);

function dayDots(){
  const days=['M','T','W','T','F','S','S'];
  const today=N().getDay();
  const todayIdx=today===0?6:today-1;
  return days.map((d,i)=>`<div class="day-item"><span class="day-lbl">${d}</span><div class="day-dot ${i<todayIdx?'past':i===todayIdx?'today':'future'}"></div></div>`).join('');
}

function weekSummaries(){
  const res=[];const n=N();
  for(let w=0;w<3;w++){
    const ws=new Date(n);ws.setDate(n.getDate()+w*7);
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    const exps=[];
    S.expenses.forEach(e=>{for(let d=new Date(ws);d<=we;d.setDate(d.getDate()+1)){if(d.getDate()===e.day){exps.push(e);break;}}});
    if(!exps.length)continue;
    const total=exps.reduce((a,e)=>a+e.amount,0);
    const byAcct={};
    exps.forEach(e=>{const ac=S.accounts.find(a=>a.id===e.accountId)||{id:0,name:'Other',balance:0,color:'#888'};if(!byAcct[ac.id])byAcct[ac.id]={ac,amt:0,items:[]};byAcct[ac.id].amt+=e.amount;byAcct[ac.id].items.push(e.name);});
    const acctBreaks=Object.values(byAcct).map(g=>({name:g.ac.name,total:g.amt,items:g.items,color:g.ac.color,covered:g.ac.balance>=g.amt,shortBy:Math.max(0,g.amt-g.ac.balance)}));
    const allCovered=acctBreaks.every(a=>a.covered);
    res.push({w,label:['This week','Next week','Following'][w],dateRange:fmtDs(ws)+' \u2013 '+fmtDs(we),total,allCovered,shortBy:acctBreaks.reduce((a,b)=>a+b.shortBy,0),acctBreaks});
  }
  return res;
}

  document.getElementById('wdetail').classList.remove('on');

  det.innerHTML=`<p style="font-size:11px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;">${s.label} \u00b7 ${s.dateRange}</p>${rows}<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);" class="wdrow"><span style="font-size:13px;color:var(--t3);">Total going out</span><span style="font-size:13px;font-weight:500;">\u00a3${fmt(s.total)}</span></div>`;
  det.classList.add('on');
  setTimeout(()=>det.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function weeks8(){
  const wks=[];const n=N();let bal=totalBal();
  for(let w=0;w<8;w++){
    const ws=new Date(n);ws.setDate(n.getDate()+w*7);const we=new Date(ws);we.setDate(ws.getDate()+6);
    const wsS=ws.toISOString().split('T')[0];const weS=we.toISOString().split('T')[0];
    const inc=[];const exp=[];
    S.income.forEach(i=>{if(i.freq==='monthly'){const day=new Date(i.date).getDate();for(let d=new Date(ws);d<=we;d.setDate(d.getDate()+1)){if(d.getDate()===day){inc.push({...i});break;}}}else if(i.date>=wsS&&i.date<=weS){inc.push(i);}});
    S.expenses.forEach(e=>{for(let d=new Date(ws);d<=we;d.setDate(d.getDate()+1)){if(d.getDate()===e.day){exp.push(e);break;}}});
    const wIn=inc.reduce((a,i)=>a+i.amount,0);const wOut=exp.reduce((a,e)=>a+e.amount,0);
    bal+=wIn-wOut;
    wks.push({w,ws,we,inc,exp,wIn,wOut,net:wIn-wOut,bal,safe:bal>500,low:bal>0&&bal<=500});
  }
  return wks;
}

function alloc(gross,costs){
  const net=Math.max(0,gross-costs);const res=[];let rem=net;
  const ord={priority:0,pct:1,fixed:2,target:3,remainder:4};
  // First pass: all non-remainder pots
  [...S.pots].filter(p=>p.rule.type!=='remainder').sort((a,b)=>ord[a.rule.type]-ord[b.rule.type]).forEach(p=>{
    let amt=0,note='',skip=false;const r=p.rule;
    if(r.type==='priority'){const fv=r.fundingType==='pct'?net*r.fundingValue/100:r.fundingValue||0;const need=Math.max(0,r.target-p.current);if(need<=0){skip=true;note='Already covered';}else{amt=Math.min(fv||need,need,rem);note=(r.fundingType==='pct'?r.fundingValue+'%':'\u00a3'+fmt(r.fundingValue||0))+' until \u00a3'+fmt(r.target)+' reached';}}
    else if(r.type==='pct'){const raw=Math.round(net*r.value/100);amt=r.accountLimit?Math.min(raw,r.accountLimit,rem):Math.min(raw,rem);note=r.value+'% of incoming'+(r.accountLimit?' (max \u00a3'+fmt(r.accountLimit)+')':'');}
    else if(r.type==='fixed'){amt=r.accountLimit?Math.min(r.value,r.accountLimit,rem):Math.min(r.value,rem);note='\u00a3'+fmt(r.value)+' per payment'+(r.accountLimit?' (max \u00a3'+fmt(r.accountLimit)+')':'');}
    else if(r.type==='target'){const need=Math.max(0,r.target-p.current);if(need<=0){skip=true;note='Target reached';}else{const fv=r.fundingType==='pct'?Math.round(net*r.fundingValue/100):r.fundingValue||0;amt=Math.min(fv,need,rem);note=(r.fundingType==='pct'?r.fundingValue+'%':'\u00a3'+fmt(r.fundingValue||0))+' towards \u00a3'+fmt(r.target)+' goal';}}
    rem=Math.max(0,rem-amt);res.push({p,amt,note,skip});
  });
  // Second pass: remainder pots split the leftover
  const remPots=S.pots.filter(p=>p.rule.type==='remainder');
  const totalRemPct=remPots.reduce((a,p)=>a+p.rule.value,0);
  const remAtStart=rem;
  remPots.forEach(p=>{
    const share=totalRemPct>0?Math.round(remAtStart*(p.rule.value/totalRemPct)):0;
    const amt=Math.min(share,rem);
    rem=Math.max(0,rem-amt);
    res.push({p,amt,note:p.rule.value+'% of remainder',skip:false});
  });
  return{res,rem,net};
}

  const pct=Math.min(100,Math.max(4,Math.round(last/Math.max(1,totalBal())*100)));
  document.getElementById('fcbar').style.cssText=`width:${pct}%;background:${last>0?'var(--gr)':'var(--wa)'};`;
  document.getElementById('fcnote').textContent=hasRisk?'\u26a0 Potential shortfall \u2014 check weeks below':'No shortfalls over 8 weeks \u2014 looking good.';

  }).join('');
}

function confirmAlloc(){
  const p=S.pending;if(!p)return;
  const r=alloc(p.amount,p.costs||0);
  // Fund pots
  r.res.forEach(a=>{a.p.current+=a.amt;});
  // Add full gross amount to the chosen account
  if(p.accountId){
    const ac=S.accounts.find(a=>a.id===p.accountId);
    if(ac)ac.balance+=p.amount;
  }
  S.pending=null;renderAll();go('home');
}

function rManage(){
  const t=S.mgTab;const el=document.getElementById('mgc');
  const L=x=>`<p class="lbl" style="margin-bottom:8px;">${x}</p>`;
  const rd=r=>{
    if(r.type==='pct')return r.value+'% of payment'+(r.accountLimit?' \u00b7 max \u00a3'+fmt(r.accountLimit):'');
    if(r.type==='fixed')return'\u00a3'+fmt(r.value)+' per payment'+(r.accountLimit?' \u00b7 max \u00a3'+fmt(r.accountLimit):'');
    if(r.type==='target')return'Target \u00a3'+fmt(r.target)+' \u00b7 '+(r.fundingType==='pct'?r.fundingValue+'%':'\u00a3'+fmt(r.fundingValue||0))+'/payment';
    if(r.type==='priority')return'Priority up to \u00a3'+fmt(r.target)+' \u00b7 '+(r.fundingType==='pct'?r.fundingValue+'%':'\u00a3'+fmt(r.fundingValue||0));
    if(r.type==='remainder')return'Remainder split \u00b7 '+r.value+'%';
    return'';

function loadLocalPhoto(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    // Compress the image before storing to keep localStorage size manageable
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const maxW = 800;
      const scale = img.width > maxW ? maxW / img.width : 1;
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      applyBg(dataUrl);
      openModal('bg-picker');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderBgPicker(){
  // Re-render the picker to update selected state

  openModal('bg-picker');
}

function saveAcct(isEdit){const name=document.getElementById('m-name').value;const bal=parseFloat(document.getElementById('m-bal').value)||0;if(!name)return;if(isEdit){const ac=S.accounts.find(x=>x.id===_eid);if(!ac)return;ac.name=name;ac.balance=bal;}else{S.accounts.push({id:Date.now(),name,balance:bal,color:COLORS[cidx++%COLORS.length]});}closeModal();renderAll();}
function savePot(isEdit){const name=document.getElementById('m-name').value;const bal=parseFloat(document.getElementById('m-bal').value)||0;const rule=getPotRule();if(!name)return;if(isEdit){const p=S.pots.find(x=>x.id===_eid);if(!p)return;p.name=name;p.current=bal;p.rule=rule;}else{S.pots.push({id:Date.now(),name,color:COLORS[cidx++%COLORS.length],current:bal,rule});}closeModal();rManage();}
function saveInc(isEdit){const name=document.getElementById('m-name').value;const amt=parseFloat(document.getElementById('m-amt').value)||0;const date=document.getElementById('m-date').value||td();const freq=document.getElementById('m-freq').value;if(!name||!amt)return;if(isEdit){const i=S.income.find(x=>x.id===_eid);if(!i)return;i.name=name;i.amount=amt;i.date=date;i.freq=freq;}else{S.income.push({id:Date.now(),name,amount:amt,date,freq,cat:'other'});}closeModal();renderAll();}
function saveExp(isEdit){const name=document.getElementById('m-name').value;const amt=parseFloat(document.getElementById('m-amt').value)||0;const day=parseInt(document.getElementById('m-day').value)||1;const accountId=parseInt(document.getElementById('m-acct').value);const cat=document.getElementById('m-cat').value;if(!name||!amt)return;if(isEdit){const e=S.expenses.find(x=>x.id===_eid);if(!e)return;e.name=name;e.amount=amt;e.day=day;e.accountId=accountId;e.cat=cat;}else{S.expenses.push({id:Date.now(),name,amount:amt,day,cat,accountId});}closeModal();renderAll();}
function savePay(){const a=parseFloat(document.getElementById('ap-a').value)||0;if(!a)return;const acEl=document.getElementById('ap-acct');S.pending={amount:a,desc:document.getElementById('ap-d').value||'Payment',accountId:acEl?parseInt(acEl.value)||null:null,date:document.getElementById('ap-dt').value||td(),costs:parseFloat(document.getElementById('ap-c').value)||0,freq:document.getElementById('ap-f').value};closeModal();rAllocate();}
function doMI(){const a=parseFloat(document.getElementById('m-amt').value)||0;const d=document.getElementById('m-desc').value||'Payment';if(!a)return;S.income.push({id:Date.now(),name:d,amount:a,date:td(),freq:'one-off',cat:'other'});S.pending={amount:a,desc:d,date:td(),costs:0,freq:'one-off'};closeModal();renderAll();go('allocate');}
function doMO(){const a=parseFloat(document.getElementById('m-amt').value)||0;if(!a)return;if(S.accounts.length>0)S.accounts[0].balance=Math.max(0,S.accounts[0].balance-a);closeModal();renderAll();}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function mbg(e){if(e.target===document.getElementById('modal'))closeModal();}
function go(name){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.nb').forEach(n=>n.classList.remove('on'));document.getElementById('sc-'+name).classList.add('on');document.getElementById('nav-'+name).classList.add('on');}
function saveState(){
  const data = {
    accounts:S.accounts,
    income:S.income,
    expenses:S.expenses,
    pots:S.pots,
    pending:S.pending||null
  };
  // Save locally
  try{localStorage.setItem('hz_data', JSON.stringify(data));}catch(e){}
  // Save to Firebase (suppress remote echo)
  if(window._fbReady && window._fbSet && window._fbRef){
    window._suppressRemote = true;
    const dot = document.getElementById('sync-dot');
    if(dot) dot.style.background = 'rgba(255,255,255,.3)';
    window._fbSet(window._fbRef, data).then(()=>{
      setTimeout(()=>{ window._suppressRemote = false; }, 1500);
      if(dot){ dot.style.background='var(--gr)'; setTimeout(()=>{ dot.style.background='rgba(255,255,255,.2)'; },1200); }
    }).catch((e)=>{
      window._suppressRemote = false;
      if(dot){ dot.style.background='var(--wa)'; setTimeout(()=>{ dot.style.background='rgba(255,255,255,.2)'; },2000); }
    });
  }
}

function loadState(){
  try{
    const raw=localStorage.getItem('hz_data');
    if(!raw)return;
    const d=JSON.parse(raw);
    if(d.accounts&&d.accounts.length)S.accounts=d.accounts;
    if(d.income)S.income=d.income;
    if(d.expenses)S.expenses=d.expenses;
    if(d.pots)S.pots=d.pots;
    S.pending=d.pending||null;
  }catch(e){}
}

function clearAllData(){
  const b=document.getElementById('mbody');
  b.innerHTML=`
    <p style="font-size:22px;font-weight:300;font-family:var(--fs);color:var(--t1);margin-bottom:8px;">Delete all data?</p>
    <p style="font-size:14px;color:var(--t2);margin-bottom:24px;line-height:1.6;">This will wipe all your accounts, balances, expenses, income and pots. There's no undo.</p>
    <div style="display:flex;gap:8px;">
      <button class="chip" style="flex:1;justify-content:center;" onclick="closeModal()">Cancel</button>
      <button class="chip" style="flex:1;justify-content:center;background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.35);color:rgba(248,113,113,.9);" onclick="confirmDelete()">Yes, delete everything</button>
    </div>`;
  document.getElementById('modal').classList.add('on');
}

function confirmDelete(){
  localStorage.removeItem('hz_data');
  closeModal();
  location.reload();
}

function renderAll(){rHome();rForecast();rAllocate();rManage();saveState();}
window.renderAll = renderAll;
loadState();
// Apply saved background image on load
document.getElementById('bg').style.backgroundImage = 'url(' + BG_URL + ')';
renderAll();
</script>
</body>
</html>
