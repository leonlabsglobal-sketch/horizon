<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Horizon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDtNxq2QAVQWEWLeYDX_jYHvVzySWCSHpA",
    authDomain: "horizon-app-36689.firebaseapp.com",
    databaseURL: "https://horizon-app-36689-default-rtdb.firebaseio.com",
    projectId: "horizon-app-36689",
    storageBucket: "horizon-app-36689.firebasestorage.app",
    messagingSenderId: "46657774312",
    appId: "1:46657774312:web:4fcc929454f67a8c535f5d"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dataRef = ref(db, 'horizon');
  window._fbRef = dataRef;
  window._fbSet = set;
  window._fbOnValue = onValue;
  window._fbReady = true;
  onValue(dataRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    if (window._suppressRemote) return;
    if (data.accounts) window.S.accounts = data.accounts;
    if (data.income) window.S.income = data.income;
    if (data.expenses) window.S.expenses = data.expenses;
    if (data.pots) window.S.pots = data.pots;
    if (data.debts) window.S.debts = data.debts;
    if (data.pending !== undefined) window.S.pending = data.pending;
    if (data.balanceUpdated) window.S.balanceUpdated = data.balanceUpdated;
    try{ window.renderAll(); }catch(e){ console.error('Firebase renderAll',e); }
  });
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ff:'DM Sans',sans-serif;
  --fs:'Playfair Display',Georgia,serif;
  --t1:rgba(255,255,255,.92);--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.3);
  --bd:rgba(255,255,255,.15);--gl:rgba(255,255,255,.09);--gl2:rgba(255,255,255,.16);
  --gr:rgba(255,255,255,.9);--grg:rgba(255,255,255,.1);--grb:rgba(255,255,255,.3);
  --wa:#E8B86D;--wag:rgba(232,184,109,.13);--wab:rgba(232,184,109,.38);
  --am:#F5C842;--amg:rgba(245,200,66,.13);--amb:rgba(245,200,66,.32);
}
*{-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;touch-action:none;font-family:var(--ff);color:var(--t1);-webkit-font-smoothing:antialiased;background:#080c10;}
.app{max-width:390px;margin:0 auto;height:100%;height:100dvh;overflow:hidden;position:relative;}
.bg{position:fixed;inset:0;max-width:390px;margin:0 auto;z-index:0;background-size:cover;background-position:center top;background-repeat:no-repeat;}
.bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,8,.42) 0%,rgba(0,0,8,.28) 55%,rgba(0,0,8,.52) 100%);pointer-events:none;}
/* Screens: absolutely stacked so only .on is visible; no bleed during transitions */
.sc{display:none;flex-direction:column;position:absolute;inset:0;overflow:hidden;z-index:1;}
.sc.on{display:flex;}
.home-hero{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:0 24px 6px;min-height:0;}
.home-topbar{display:flex;justify-content:space-between;align-items:flex-start;padding-top:44px;position:relative;z-index:2;margin-bottom:4px;}
.topbar-btns{display:flex;gap:8px;padding-top:2px;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);border:1px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;color:var(--t1);}
.icon-btn.gr{color:var(--gr);background:var(--grg);border-color:var(--grb);}
.icon-btn.wa{color:var(--wa);background:var(--wag);border-color:var(--wab);}
.home-greeting{font-family:var(--fs);font-weight:300;font-size:min(40px,10.5vw);letter-spacing:-.02em;line-height:1.1;position:relative;z-index:2;margin-bottom:4px;color:var(--t1);}
.acct-strips{padding:0 20px 10px;position:relative;z-index:1;flex-shrink:0;display:flex;flex-direction:column;gap:6px;max-height:220px;overflow:hidden;}
.acct-strip{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,255,255,.1);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(255,255,255,.2);border-radius:12px;}
.acct-name{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2);}
.acct-bal{font-size:14px;font-weight:500;color:var(--t1);}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.pgr{background:var(--grg);color:var(--gr);border:1px solid var(--grb);}
.pam{background:var(--amg);color:var(--am);border:1px solid var(--amb);}
.pwa{background:var(--wag);color:var(--wa);border:1px solid var(--wab);}
.dot{width:4px;height:4px;border-radius:50%;background:currentColor;display:inline-block;}
.chip{display:inline-flex;align-items:center;gap:7px;padding:12px 14px;border-radius:14px;border:1px solid var(--bd);background:rgba(255,255,255,.1);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);color:var(--t1);font-size:14px;font-family:var(--ff);font-weight:500;cursor:pointer;transition:all .15s;}
.chip:active{opacity:.75;transform:scale(.97);}
.chip-sm{padding:7px 12px;font-size:12px;border-radius:10px;}
.chip-full{width:100%;justify-content:center;padding:15px;border-radius:16px;font-size:15px;}
.chip-solid{background:rgba(255,255,255,.88);color:rgba(0,0,0,.85);border-color:rgba(255,255,255,.95);font-weight:600;backdrop-filter:none;-webkit-backdrop-filter:none;}
.chip-gr{background:var(--grg);border-color:var(--grb);color:var(--gr);}
.chip-wa{background:var(--wag);border-color:var(--wab);color:var(--wa);}
.home-upcoming{padding:0 20px 8px;flex-shrink:0;}
.upcoming-label{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.chips3{display:flex;gap:8px;}
.wchip{flex:1;background:rgba(255,255,255,.1);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);border:1px solid var(--bd);border-radius:14px;padding:13px 10px;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:all .18s;min-width:0;}
.wchip.on{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3);}
.wchip-label{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wchip-amt{font-size:11px;color:var(--t3);}
.wdetail{display:block;max-height:0;overflow:hidden;opacity:0;margin-top:0;background:rgba(255,255,255,.09);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);border:1px solid transparent;border-radius:14px;padding:0 16px;transition:max-height 360ms cubic-bezier(0,1,.5,1),opacity 220ms ease,padding 360ms cubic-bezier(0,1,.5,1),margin-top 360ms ease,border-color 220ms ease;}
.wdetail.on{max-height:900px;opacity:1;padding:14px 16px;margin-top:8px;border-color:var(--bd);}
.wdrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.wdrow+.wdrow{border-top:1px solid rgba(255,255,255,.08);}
.home-next{padding:4px 20px 0;flex-shrink:0;}
.next-strip{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid rgba(255,255,255,.1);}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;z-index:50;padding:8px 20px 24px;}
.ni{background:rgba(255,255,255,.1);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(255,255,255,.2);border-radius:28px;display:flex;padding:5px;box-shadow:0 8px 40px rgba(0,0,0,.25);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;cursor:pointer;color:rgba(255,255,255,.38);font-size:9px;letter-spacing:.07em;text-transform:uppercase;border-radius:18px;transition:all .2s;user-select:none;font-family:var(--ff);}
.nb i{font-size:19px;}.nb span{font-size:9px;}
.nb.on{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:rgba(255,255,255,.95);}
.screen-pad{padding:52px 20px 20px;}
.screen-title{font-size:36px;font-weight:300;font-family:var(--fs);margin-bottom:6px;letter-spacing:-.02em;color:var(--t1);}
.screen-sub{font-size:14px;color:var(--t2);margin-bottom:20px;}
.glass{background:rgba(255,255,255,.09);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:18px 20px;}
.glass-sm{background:rgba(255,255,255,.09);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:14px 16px;}
.btr{height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;}
.bfill{height:100%;border-radius:2px;transition:width .6s;}
.fwc{background:rgba(255,255,255,.09);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);border:1px solid rgba(255,255,255,.15);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;}
.fwc.open{border-color:rgba(255,255,255,.32);}
.fwh{padding:15px 18px;}
.fwb{display:none;border-top:1px solid rgba(255,255,255,.1);padding:12px 18px 14px;background:rgba(0,0,0,.12);}
.fwb.on{display:block;}
.fwr{display:flex;justify-content:space-between;padding:4px 0;}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:0 20px 12px;scrollbar-width:none;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 16px;border-radius:20px;font-size:12px;cursor:pointer;color:var(--t2);border:1px solid rgba(255,255,255,.15);white-space:nowrap;background:rgba(255,255,255,.09);backdrop-filter:blur(12px) saturate(180%);-webkit-backdrop-filter:blur(12px) saturate(180%);font-weight:500;transition:all .15s;}
.tab.on{color:var(--t1);border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.18);font-weight:600;}
.ar{display:flex;align-items:center;gap:14px;padding:13px 16px;}
.ar+.ar{border-top:1px solid rgba(255,255,255,.08);}
.ad{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.ov.on{display:flex;}
.mbox{background:rgba(12,14,20,.88);backdrop-filter:blur(32px) saturate(200%);-webkit-backdrop-filter:blur(32px) saturate(200%);border:1px solid rgba(255,255,255,.16);border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-width:390px;max-height:90vh;overflow-y:auto;}
.mh{width:32px;height:3px;background:rgba(255,255,255,.22);border-radius:2px;margin:0 auto 22px;}
.inp{width:100%;background:rgba(255,255,255,.1);backdrop-filter:blur(12px) saturate(180%);-webkit-backdrop-filter:blur(12px) saturate(180%);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:var(--t1);font-family:var(--ff);font-size:14px;padding:12px 14px;outline:none;transition:border-color .15s;}
.inp:focus{border-color:rgba(255,255,255,.42);}
.inp::placeholder{color:rgba(255,255,255,.3);}
select.inp option{background:rgba(15,18,28,.97);}
.lbl{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;}
.sh{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;padding:0 20px;margin-bottom:12px;}
.r{display:flex;justify-content:space-between;align-items:center;}
.c{display:flex;flex-direction:column;}
.g4{gap:4px;}.g8{gap:8px;}.g12{gap:12px;}
.toggle-row{display:flex;gap:6px;}
.toggle-opt{flex:1;padding:10px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.09);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--t2);font-size:13px;font-family:var(--ff);cursor:pointer;text-align:center;transition:all .15s;}
.toggle-opt.on{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.32);color:var(--t1);}

/* ══════════════════════════════════════
   ANIMATION SYSTEM
   ══════════════════════════════════════ */

/* ── Page transitions: incoming only slides in, outgoing fades+scales back ── */
/* Old screen fades into background, new screen slides in cleanly — no bleed */
.sc.sc-out{animation:scOut .28s cubic-bezier(.4,0,.2,1) both;}
.sc.sc-in-r{animation:scInR .28s cubic-bezier(.4,0,.2,1) both;}
.sc.sc-in-l{animation:scInL .28s cubic-bezier(.4,0,.2,1) both;}
@keyframes scOut{from{opacity:1;transform:scale(1);}to{opacity:0;transform:scale(.97);}}
@keyframes scInR{from{transform:translateX(24%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes scInL{from{transform:translateX(-24%);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ── Nav icon spring bounce (targets svg, not i) ── */
@keyframes navBounce{0%{transform:scale(1);}25%{transform:scale(.78);}65%{transform:scale(1.18);}100%{transform:scale(1);}}
.nb-bounce > .nbi{animation:navBounce 300ms cubic-bezier(.34,1.56,.64,1) both;}
/* Nav label fade-up when active */
@keyframes labelFadeUp{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
.nb.on > span{animation:labelFadeUp 200ms ease 60ms both;}

/* ── Inline SVG nav icons ── */
.nbi{width:22px;height:22px;display:block;flex-shrink:0;}

/* HOME — door fills and opens on active */
.ni-door{
  transition:fill .25s ease,transform .32s cubic-bezier(.34,1.2,.64,1);
  transform-box:fill-box;transform-origin:left center;
  fill:transparent;
}
.nb.on .ni-door{fill:rgba(255,255,255,.55);transform:scaleX(0.18);}

/* FORECAST — line draws from base to tip on active */
.ni-line{stroke-dasharray:23;stroke-dashoffset:23;}
.ni-arr{stroke-dasharray:11;stroke-dashoffset:11;}
.nb.on .ni-line{animation:drawLine 360ms cubic-bezier(.4,0,.2,1) forwards;}
.nb.on .ni-arr{animation:drawArr 260ms cubic-bezier(.4,0,.2,1) 180ms forwards;}
@keyframes drawLine{from{stroke-dashoffset:23;}to{stroke-dashoffset:0;}}
@keyframes drawArr{from{stroke-dashoffset:11;}to{stroke-dashoffset:0;}}
/* Inactive: fully drawn, dimmer */
.nb:not(.on) .ni-line,.nb:not(.on) .ni-arr{stroke-dashoffset:0;}

/* ALLOCATE — note peeks up out of wallet */
.ni-note{
  transform-box:fill-box;transform-origin:center bottom;
  transform:translateY(5px) scaleY(0.3);opacity:0;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .2s ease;
  fill:rgba(255,255,255,.2);stroke:currentColor;
}
.nb.on .ni-note{transform:translateY(0) scaleY(1);opacity:1;}
/* Coin turns gold on active */
.ni-coin{transition:fill .25s ease,stroke .25s ease;}
.nb.on .ni-coin{fill:rgba(245,200,66,.7);stroke:#F5C842;}

/* MANAGE — slider knobs move to new positions and fill */
.ni-s1,.ni-s2,.ni-s3{
  fill:transparent;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1),fill .2s ease;
  transition-delay:0ms,0ms;
}
.ni-s2{transition-delay:50ms,50ms;}
.ni-s3{transition-delay:100ms,100ms;}
.nb.on .ni-s1{transform:translateX(5px);fill:currentColor;}
.nb.on .ni-s2{transform:translateX(-5px);fill:currentColor;}
.nb.on .ni-s3{transform:translateX(4px);fill:currentColor;}

/* ── Warning pill breathe ── */
@keyframes breathe{0%,100%{opacity:.82;}50%{opacity:1;}}
.pwa{animation:breathe 2.5s ease-in-out infinite;}

/* ── Delete/remove shake ── */
@keyframes hz-shake{0%,100%{transform:translateX(0);}18%{transform:translateX(-6px);}36%{transform:translateX(6px);}54%{transform:translateX(-4px);}72%{transform:translateX(3px);}90%{transform:translateX(-1px);}}
.hz-shake{animation:hz-shake 220ms ease both;}

/* ── Ripple ── */
.hz-ripple-wrap{position:relative;overflow:hidden;}
.hz-ripple{position:absolute;border-radius:50%;pointer-events:none;transform:scale(0);animation:hz-ripple-anim 500ms cubic-bezier(.4,0,.2,1) forwards;}
@keyframes hz-ripple-anim{to{transform:scale(4.5);opacity:0;}}

/* ── Wdetail row stagger ── */
@keyframes wdrowIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}

/* ── Reduced motion: kill everything ── */
@media(prefers-reduced-motion:reduce){
  *,::before,::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}
}
</style>
</head>
<body>
<div class="app">
<div class="bg" id="bg"></div>

<!-- HOME -->
<div id="sc-home" class="sc on" style="padding-bottom:88px;">
  <div class="home-hero">
    <div class="home-topbar">
      <div></div>
      <div class="topbar-btns" style="align-items:center;gap:8px;">
        <div id="sync-dot" style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0;transition:background .4s;"></div>
        <button class="icon-btn gr hz-ripple-wrap" onclick="rippleFrom(this,event);openModal('mi')" title="Money In"><i class="ti ti-arrow-down-circle"></i></button>
        <button class="icon-btn wa" onclick="openModal('mo')" title="Money Out"><i class="ti ti-arrow-up-circle"></i></button>
        <button class="icon-btn" onclick="openModal('bg-picker')" style="color:rgba(255,255,255,.5);"><i class="ti ti-photo"></i></button>
      </div>
    </div>
    <p class="home-greeting" id="hgreeting">Good morning</p>
    <p id="hstatus-bar" style="display:none;"></p>
    <div class="acct-strips" id="haccts"></div>
  </div>
  <div class="home-upcoming">
    <p class="upcoming-label">upcoming</p>
    <div class="chips3" id="hwks"></div>
    <div class="wdetail" id="wdetail"></div>
  </div>
</div>

<!-- FORECAST -->
<div id="sc-forecast" class="sc" style="touch-action:pan-y;">
  <div style="flex:1;overflow-y:auto;padding-bottom:120px;">
    <div class="screen-pad">
      <p class="screen-title">Forecast</p>
      <p class="screen-sub">Month by month — is my money growing?</p>
      <!-- Monthly overview -->
      <div style="display:flex;gap:8px;margin-bottom:16px;" id="fcmonths"></div>
      <!-- 8-week summary bar -->
      <div class="glass" style="margin-bottom:4px;">
        <div class="r" style="margin-bottom:10px;"><p class="lbl">8-week closing balance</p><p style="font-size:20px;font-weight:400;font-family:var(--fs);" id="fcend">—</p></div>
        <div class="btr" style="margin-bottom:10px;"><div class="bfill" id="fcbar"></div></div>
        <p style="font-size:13px;color:var(--t2);" id="fcnote"></p>
      </div>
    </div>
    <p class="sh">week by week</p>
    <div style="padding:0 20px;display:flex;flex-direction:column;gap:8px;" id="fcwks"></div>
  </div>
</div>

<!-- ALLOCATE -->
<div id="sc-allocate" class="sc" style="touch-action:pan-y;">
  <div style="flex:1;overflow-y:auto;padding-bottom:120px;">
    <div class="screen-pad">
      <p class="screen-title">Allocate</p>
      <p class="screen-sub">What should I do with this payment?</p>
    </div>
    <div style="padding:0 20px;display:flex;flex-direction:column;gap:14px;" id="alc"></div>
  </div>
</div>

<!-- MANAGE -->
<div id="sc-manage" class="sc" style="touch-action:pan-y;">
  <div style="flex-shrink:0;padding-top:52px;">
    <div style="padding:0 20px 4px;">
      <p class="screen-title">Manage</p>
      <p class="screen-sub" style="margin-bottom:0;">Your rules and balances</p>
    </div>
    <div class="tabs" style="margin-top:12px;" id="mg-tabs">
      <div class="tab on" onclick="mt('accounts',this)">Accounts</div>
      <div class="tab" onclick="mt('pots',this)">Pots</div>
      <div class="tab" onclick="mt('income',this)">Income</div>
      <div class="tab" onclick="mt('expenses',this)">Expenses</div>
      <div class="tab" onclick="mt('debts',this)">Debts</div>

<script>
window.S = window.S || {};
const S = window.S;
Object.assign(S, { accounts:[], income:[], expenses:[], pots:[], debts:[], pending:null, mgTab:'accounts', openChip:-1 });
if (!S.balanceUpdated) S.balanceUpdated = {};
if (!S.debts) S.debts = [];

let BG_URL = localStorage.getItem('hz_bg') || 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80';
function applyBg(url){ BG_URL=url; localStorage.setItem('hz_bg',url); document.getElementById('bg').style.backgroundImage='url('+url+')'; }
const BG_PRESETS=[
  {label:'Mountain lake',url:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80'},
  {label:'Ocean horizon',url:'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=800&q=80'},
  {label:'Misty forest',url:'https://images.unsplash.com/photo-1448375240586-882707db888b?w=800&q=80'},
  {label:'Desert dunes',url:'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=800&q=80'},
  {label:'Northern lights',url:'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=800&q=80'},
  {label:'City at night',url:'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80'},
  {label:'Calm sea',url:'https://images.unsplash.com/photo-1505459668311-8dfac7952bf0?w=800&q=80'},
  {label:'Autumn road',url:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80'},
];

const fmt = n => Math.round(n).toLocaleString('en-GB');
const fmtBal = n => n < 0 ? '-£' + fmt(-n) : '£' + fmt(n);
const fmtD = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
const fmtDs = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const td = () => new Date().toISOString().split('T')[0];
const N = () => new Date();
const greet = () => { const h=N().getHours(); return h<12?'Good morning':h<18?'Good afternoon':'Good evening'; };
const expMonthly = e => { const f=e.freq||'monthly'; if(f==='weekly') return e.amount*52/12; if(f==='termly') return e.amount*3/12; if(f==='half-termly') return e.amount*6/12; return e.amount; };
const meOut = () => S.expenses.reduce((a,e) => a+expMonthly(e), 0);
const totalBal = () => S.accounts.reduce((a,ac) => a+ac.balance, 0);
const burn = () => meOut()/30;
const runway = () => { const b=burn(); return b>0?Math.floor(totalBal()/b):999; };
const status = () => { const d=runway(); return d>30?'gr':d>7?'am':'wa'; };
const acctExpenses = id => S.expenses.filter(e=>e.accountId===id).reduce((a,e)=>a+expMonthly(e),0);
const acctCovered = ac => ac.balance >= acctExpenses(ac.id);
const acctShort = ac => Math.max(0, acctExpenses(ac.id)-ac.balance);

function freshnessLabel(acId) {
  if (!S.balanceUpdated) return '';
  const raw = S.balanceUpdated[acId];
  if (!raw) return '';
  const days = Math.floor((Date.now()-new Date(raw).getTime())/86400000);
  if (days===0) return 'updated today';
  if (days===1) return 'updated yesterday';
  if (days<=6) return 'updated '+days+'d ago';
  return '<span style="color:var(--wa);">updated '+days+'d ago</span>';
}

function expInWeek(e, wsDate, weDate, wsStr, weStr) {
  const f = e.freq || 'monthly';
  if (f==='monthly') {
    for (let d=new Date(wsDate); d<=weDate; d.setDate(d.getDate()+1)) { if (d.getDate()===e.day) return true; }
  } else if (f==='weekly') {
    for (let d=new Date(wsDate); d<=weDate; d.setDate(d.getDate()+1)) { if (d.getDay()===(e.dow??1)) return true; }
  } else if (f==='termly'||f==='half-termly') {
    if (e.termDate && e.termDate>=wsStr && e.termDate<=weStr) return true;
  }
  return false;
}

function weekSummaries() {
  const res=[]; const n=N();
  for (let w=0; w<3; w++) {
    const ws=new Date(n); ws.setDate(n.getDate()+w*7);
    const we=new Date(ws); we.setDate(ws.getDate()+6);
    const wsS=ws.toISOString().split('T')[0]; const weS=we.toISOString().split('T')[0];
    const exps=S.expenses.filter(e=>expInWeek(e,ws,we,wsS,weS));
    if (!exps.length) continue;
    const total=exps.reduce((a,e)=>a+e.amount,0);
    const byAcct={};
    exps.forEach(e=>{ const ac=S.accounts.find(a=>a.id===e.accountId)||{id:0,name:'Other',balance:0,color:'#888'}; if(!byAcct[ac.id]) byAcct[ac.id]={ac,amt:0,items:[]}; byAcct[ac.id].amt+=e.amount; byAcct[ac.id].items.push(e.name); });
    const acctBreaks=Object.values(byAcct).map(g=>({name:g.ac.name,total:g.amt,items:g.items,color:g.ac.color,covered:g.ac.balance>=g.amt,shortBy:Math.max(0,g.amt-g.ac.balance)}));
    const allCovered=acctBreaks.every(a=>a.covered);
    res.push({w,label:['This week','Next week','Following'][w],dateRange:fmtDs(ws)+' – '+fmtDs(we),total,allCovered,shortBy:acctBreaks.reduce((a,b)=>a+b.shortBy,0),acctBreaks});
  }
  return res;
}

function rHome() {
  if (S.accounts.length===0) {
    document.getElementById('hgreeting').textContent=greet();
    document.getElementById('hstatus-bar').style.display='none';
    document.getElementById('haccts').innerHTML='<div style="padding:12px 0;"><p style="font-size:13px;color:rgba(255,255,255,.5);">No accounts yet — go to <b style="color:#fff;">Manage</b> to get started.</p></div>';
    document.getElementById('hwks').innerHTML='';
    document.getElementById('wdetail').classList.remove('on');
    return;
  }
  document.getElementById('hgreeting').textContent=greet();

  // Status line — plain text, no box
  const st=status(); const d=runway();
  const sums=weekSummaries();
  const thisWeekShort=sums.length>0&&!sums[0].allCovered;
  const sbar=document.getElementById('hstatus-bar');
  if (thisWeekShort) {
    const names=sums[0].acctBreaks.filter(a=>!a.covered).map(a=>a.name).join(' & ');
    sbar.style.cssText='display:block;font-size:13px;color:var(--wa);margin-top:6px;margin-bottom:2px;';
    sbar.textContent=names+' need topping up';
  } else if (st==='gr') {
    sbar.style.cssText='display:block;font-size:13px;color:var(--gr);margin-top:6px;margin-bottom:2px;';
    sbar.textContent='Bills covered · '+d+' days runway';
  } else if (st==='am') {
    const rd=new Date(); rd.setDate(rd.getDate()+d);
    sbar.style.cssText='display:block;font-size:13px;color:var(--am);margin-top:6px;margin-bottom:2px;';
    sbar.textContent='Funds run low by '+rd.toLocaleDateString('en-GB',{day:'numeric',month:'long'});
  } else {
    sbar.style.cssText='display:block;font-size:13px;color:var(--wa);margin-top:6px;margin-bottom:2px;';
    sbar.textContent='Top up accounts to cover bills';
  }

  // Account pills — slim single-line
  const acctPill = ac => {
    const cov=acctCovered(ac); const short=acctShort(ac);
    return '<div class="acct-strip" onclick="openModal(\'edit-acct\','+ac.id+')" style="cursor:pointer;padding:7px 12px;">'
      +'<div style="display:flex;align-items:center;gap:7px;">'
      +'<div style="width:6px;height:6px;border-radius:50%;background:'+ac.color+';flex-shrink:0;"></div>'
      +'<span style="font-size:13px;color:var(--t1);">'+ac.name+'</span>'
      +'<span style="font-size:13px;color:var(--t2);" class="acct-bal" data-roll-id="a'+ac.id+'" data-roll-val="'+ac.balance+'">£'+fmt(ac.balance)+'</span>'
      +'</div>'
      +(cov
        ?'<div class="pill pgr" style="font-size:10px;padding:2px 7px;"><span class="dot"></span>Covered</div>'
        :'<div class="pill pwa" style="font-size:10px;padding:2px 7px;">£'+fmt(short)+' short</div>')
      +'</div>';
  };
  const potPill = p =>
    '<div class="acct-strip" style="padding:7px 12px;">'
    +'<div style="display:flex;align-items:center;gap:7px;">'
    +'<div style="width:6px;height:6px;border-radius:50%;background:'+p.color+';flex-shrink:0;"></div>'
    +'<span style="font-size:13px;color:var(--t1);">'+p.name+'</span>'
    +'<span style="font-size:13px;color:var(--t2);">£'+fmt(p.current)+'</span>'
    +'</div>'
    +'<span style="font-size:10px;color:var(--t3);">Pot</span>'
    +'</div>';
  const homeItems=[
    ...S.accounts.filter(a=>a.showHome).map(acctPill),
    ...S.pots.filter(p=>p.showHome).map(potPill)
  ];
  document.getElementById('haccts').innerHTML=(homeItems.length>0?homeItems:S.accounts.map(acctPill)).join('');

  // Week chips
  document.getElementById('hwks').innerHTML=sums.map((s,i)=>{
    const stColor=s.allCovered?'var(--gr)':'var(--wa)';
    return '<div class="wchip" id="wc'+i+'" onclick="tChip('+i+','+JSON.stringify(s).replace(/"/g,'&quot;')+')">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;width:100%;">'
      +'<span class="wchip-label">'+s.label+'</span>'
      +'<i class="ti ti-'+(s.allCovered?'check':'alert-triangle')+'" style="font-size:12px;color:'+stColor+';"></i></div>'
      +'<span class="wchip-amt">£'+fmt(s.total)+'</span>'
      +'<div class="pill" style="font-size:9px;padding:2px 7px;background:'+(s.allCovered?'var(--grg)':'var(--wag)')+';color:'+stColor+';border:1px solid '+(s.allCovered?'var(--grb)':'var(--wab)')+';">'+(s.allCovered?'Covered':'Short')+'</div>'
      +'</div>';
  }).join('');
  document.getElementById('wdetail').classList.remove('on');
  document.getElementById('wdetail').innerHTML='';
  S.openChip=-1;

  // Clean up stale one-offs
  const t=td();
  S.income=S.income.filter(i=>i.freq!=='one-off'||i.date>=t);
}

function tChip(i,s) {
  const chip=document.getElementById('wc'+i); const det=document.getElementById('wdetail');
  if (S.openChip===i) { det.classList.remove('on'); det.innerHTML=''; S.openChip=-1; document.querySelectorAll('.wchip').forEach(c=>c.classList.remove('on')); return; }
  S.openChip=i; document.querySelectorAll('.wchip').forEach(c=>c.classList.remove('on')); chip.classList.add('on');
  const rows=s.acctBreaks.map(pb=>'<div class="wdrow"><div style="display:flex;align-items:center;gap:8px;"><div style="width:6px;height:6px;border-radius:50%;background:'+pb.color+';opacity:.85;"></div><span style="font-size:13px;color:var(--t2);">'+pb.name+' · '+pb.items.join(', ')+'</span></div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:13px;font-weight:500;">£'+fmt(pb.total)+'</span><div class="pill" style="font-size:10px;padding:2px 7px;background:'+(pb.covered?'var(--grg)':'var(--wag)')+';color:'+(pb.covered?'var(--gr)':'var(--wa)')+';border:1px solid '+(pb.covered?'var(--grb)':'var(--wab)')+';">'+(pb.covered?'OK':'£'+fmt(pb.shortBy)+' short')+'</div></div></div>').join('');
  det.innerHTML='<p style="font-size:11px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;">'+s.label+' · '+s.dateRange+'</p>'+rows+'<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);" class="wdrow"><span style="font-size:13px;color:var(--t3);">Total going out</span><span style="font-size:13px;font-weight:500;">£'+fmt(s.total)+'</span></div>';
  det.classList.add('on');
  _wStagger(det);
  setTimeout(()=>det.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function weeks8() {
  const wks=[]; const n=N(); let bal=totalBal();
  for (let w=0; w<8; w++) {
    const ws=new Date(n); ws.setDate(n.getDate()+w*7); const we=new Date(ws); we.setDate(ws.getDate()+6);
    const wsS=ws.toISOString().split('T')[0]; const weS=we.toISOString().split('T')[0];
    const inc=[]; const exp=[];
    S.income.forEach(i=>{ if(i.freq==='monthly'){const day=new Date(i.date).getDate();for(let d=new Date(ws);d<=we;d.setDate(d.getDate()+1)){if(d.getDate()===day){inc.push({...i});break;}}}else if(i.date>=wsS&&i.date<=weS){inc.push(i);} });
    S.expenses.forEach(e=>{ if(expInWeek(e,ws,we,wsS,weS)) exp.push(e); });
    const wIn=inc.reduce((a,i)=>a+i.amount,0); const wOut=exp.reduce((a,e)=>a+e.amount,0);
    bal+=wIn-wOut;
    wks.push({w,ws,we,inc,exp,wIn,wOut,net:wIn-wOut,bal,safe:bal>500,low:bal>0&&bal<=500});
  }
  return wks;
}

// ── Monthly summaries (3 months rolling) ──
function monthSummaries() {
  const res=[]; const n=N(); let runBal=totalBal();
  for (let m=0; m<3; m++) {
    const mS=new Date(n.getFullYear(),n.getMonth()+m,1);
    const mE=new Date(n.getFullYear(),n.getMonth()+m+1,0);
    const mSs=mS.toISOString().split('T')[0]; const mEs=mE.toISOString().split('T')[0];
    const fromDate=m===0?n:mS; const fromStr=fromDate.toISOString().split('T')[0];
    let mIn=0,mOut=0;
    // Income
    S.income.forEach(i=>{
      if(i.freq==='monthly'){
        const day=new Date(i.date).getDate();
        const d=new Date(mS.getFullYear(),mS.getMonth(),day);
        if(d>=fromDate&&d<=mE) mIn+=i.amount;
      } else if(i.freq==='weekly'){
        const dow=new Date(i.date).getDay();
        for(let d=new Date(fromDate);d<=mE;d.setDate(d.getDate()+1)){if(d.getDay()===dow) mIn+=i.amount;}
      } else {
        if(i.date>=fromStr&&i.date<=mEs) mIn+=i.amount;
      }
    });
    // Expenses
    S.expenses.forEach(e=>{
      const f=e.freq||'monthly';
      if(f==='monthly'){
        const d=new Date(mS.getFullYear(),mS.getMonth(),e.day||1);
        if(d>=fromDate&&d<=mE) mOut+=e.amount;
      } else if(f==='weekly'){
        for(let d=new Date(fromDate);d<=mE;d.setDate(d.getDate()+1)){if(d.getDay()===(e.dow??1)) mOut+=e.amount;}
      } else if(f==='termly'||f==='half-termly'){
        if(e.termDate&&e.termDate>=fromStr&&e.termDate<=mEs) mOut+=e.amount;
      }
    });
    const opening=runBal; runBal=opening+mIn-mOut;
    const net=mIn-mOut;
    res.push({label:mS.toLocaleDateString('en-GB',{month:'long',year:'numeric'}),mIn,mOut,net,opening,closing:runBal,growing:net>=0});
  }
  return res;
}

function rForecast() {
  const wks=weeks8(); const last=wks[7].bal; const hasRisk=wks.some(w=>w.bal<0);
  document.getElementById('fcend').textContent=fmtBal(last);
  document.getElementById('fcend').style.color=last>0?'var(--gr)':'var(--wa)';
  const pct=Math.min(100,Math.max(4,Math.round(last/Math.max(1,totalBal())*100)));
  document.getElementById('fcbar').style.cssText='width:'+pct+'%;background:'+(last>0?'var(--gr)':'var(--wa)')+';';
  document.getElementById('fcnote').textContent=hasRisk?'⚠ Potential shortfall — check weeks below':'No shortfalls over 8 weeks — looking good.';
  document.getElementById('fcnote').style.color=hasRisk?'var(--am)':'var(--gr)';

  // Monthly overview
  const months=monthSummaries();
  document.getElementById('fcmonths').innerHTML=months.map((m,i)=>{
    const netColor=m.growing?'var(--gr)':'var(--wa)';
    const balColor=m.closing>0?'var(--gr)':'var(--wa)';
    return '<div class="glass" style="flex:1;min-width:0;padding:14px 14px 12px;">'
      +'<p style="font-size:10px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">'+m.label+'</p>'
      +'<div class="r" style="margin-bottom:6px;"><span style="font-size:11px;color:var(--t3);">In</span><span style="font-size:13px;font-weight:500;color:var(--gr);">+£'+fmt(m.mIn)+'</span></div>'
      +'<div class="r" style="margin-bottom:10px;"><span style="font-size:11px;color:var(--t3);">Out</span><span style="font-size:13px;font-weight:500;color:rgba(255,255,255,.4);">-£'+fmt(m.mOut)+'</span></div>'
      +'<div style="border-top:1px solid rgba(255,255,255,.1);padding-top:8px;">'
      +'<div class="r" style="margin-bottom:4px;"><span style="font-size:10px;color:var(--t3);">Net</span><span style="font-size:12px;font-weight:600;color:'+netColor+';">'+(m.net>=0?'+':'')+'£'+fmt(m.net)+'</span></div>'
      +'<div class="r"><span style="font-size:10px;color:var(--t3);">End balance</span><span style="font-size:13px;font-weight:500;color:'+balColor+';">'+fmtBal(m.closing)+'</span></div>'
      +'</div>'
      +(m.growing?'<div style="margin-top:8px;display:flex;align-items:center;gap:4px;"><span style="font-size:10px;color:var(--gr);">↑ Growing</span></div>':'<div style="margin-top:8px;display:flex;align-items:center;gap:4px;"><span style="font-size:10px;color:var(--wa);">↓ Shrinking</span></div>')
      +'</div>';
  }).join('');

  document.getElementById('fcwks').innerHTML=wks.map(w=>{
    const sc=w.safe?'var(--gr)':w.low?'var(--am)':'var(--wa)'; const sl=w.safe?'Safe':w.low?'Low':'At Risk';
    const items=[...w.inc.map(i=>'<div class="fwr"><span style="font-size:13px;color:var(--t2);">'+i.name+'</span><span style="font-size:13px;font-weight:500;color:var(--gr);">+£'+fmt(i.amount)+'</span></div>'), ...w.exp.map(e=>{ const ac=S.accounts.find(a=>a.id===e.accountId); return '<div class="fwr"><span style="font-size:13px;color:var(--t2);">'+e.name+(ac?' · '+ac.name:'')+'</span><span style="font-size:13px;color:rgba(255,255,255,.4);">-£'+fmt(e.amount)+'</span></div>'; })].join('');

// ── Smart allocation engine ──
let _allocEdits = {};

// Returns a smart suggested % for a pot that has no explicit alloc set,
// based on its priority level and how far it is from its target.
function suggestPotPct(p, monthlyBills) {
  const pri=p.priority||'personal';
  // If pot has a target, weight allocation by urgency (how far from target)
  const fillPct=p.target>0?Math.min(1,p.current/p.target):0;
  const urgency=1-fillPct; // 0 = full, 1 = empty
  if(pri==='critical') return Math.round(Math.max(5, 15*urgency));
  if(pri==='important') return Math.round(Math.max(3, 10*urgency));
  if(pri==='nice') return Math.round(Math.max(2, 5*urgency));
  return 0; // personal pots get the remainder
}

function smartAlloc(gross, costs) {
  const net=Math.max(0,gross-costs);
  const monthlyBills=Math.round(S.expenses.reduce((a,e)=>a+expMonthly(e),0));
  const billsTarget=monthlyBills*2;
  const billsAcctBal=S.accounts.reduce((a,ac)=>a+ac.balance,0);
  const billsGap=Math.max(0,billsTarget-billsAcctBal);

  // Split accounts: bills-out (need topping up) vs personal-in (get remainder)
  const billsAccts=S.accounts.filter(ac=>(ac.acType||'bills')==='bills');
  const personalAccts=S.accounts.filter(ac=>ac.acType==='personal');

  // This week's expenses per account
  const n=N(); const ws=new Date(n); const we=new Date(n); we.setDate(n.getDate()+6);
  const wsS=ws.toISOString().split('T')[0]; const weS=we.toISOString().split('T')[0];

  // Each bills account gets its own row, in array order (= user priority).
  // Budget: 55% of net split across all bills accounts proportional to their shortfall.
  const totalShortfall=billsAccts.reduce((a,ac)=>a+acctShort(ac),0);
  const bufferExtra=billsGap>totalShortfall?Math.min(Math.round(net*0.1),billsGap-totalShortfall):0;
  const billsBudget=Math.min(Math.round(net*0.55),totalShortfall+bufferExtra);

  const acctItems=[];
  let usedForAccts=0;
  billsAccts.forEach(ac=>{
    const short=acctShort(ac);
    const weekExps=S.expenses.filter(e=>e.accountId===ac.id&&expInWeek(e,ws,we,wsS,weS));
    const weekAmt=weekExps.reduce((a,e)=>a+e.amount,0);
    // Share of the bills budget proportional to this account's shortfall (min: week amount)
    const share=totalShortfall>0?Math.round(billsBudget*(short/totalShortfall)):Math.round(billsBudget/Math.max(1,billsAccts.length));
    const suggested=Math.min(Math.max(weekAmt,share),net-usedForAccts);
    usedForAccts+=suggested;
    const note=weekAmt>0?'£'+fmt(weekAmt)+' due this week'+(short>0?' · £'+fmt(short)+' total shortfall':'')
                        :short>0?'£'+fmt(short)+' short — no bills due this week':'Up to date';
    acctItems.push({uid:'acct-'+ac.id,name:ac.name,color:ac.color,suggested,weekAmt,shortfall:short,note,acct:ac});
  });

  // Pots get their share of remaining
  const remaining=Math.max(0,net-usedForAccts);
  const explicitPots=S.pots.filter(p=>p.alloc>0);
  const autoPots=S.pots.filter(p=>!(p.alloc>0)&&(p.priority||'personal')!=='personal');
  const personalPots=S.pots.filter(p=>!(p.alloc>0)&&(p.priority||'personal')==='personal');

  let usedForPots=0;
  const potItems=[];

  explicitPots.forEach(p=>{
    const amt=Math.round(remaining*(p.alloc/100));
    usedForPots+=amt;
    const note=p.alloc+'% of this payment'+(p.target>0?' · '+Math.min(100,Math.round(p.current/p.target*100))+'% towards £'+fmt(p.target)+' target':'');
    potItems.push({uid:'pot-'+p.id,name:p.name,color:p.color,suggested:amt,note,pot:p});
  });

  autoPots.forEach(p=>{
    const pct=suggestPotPct(p,monthlyBills);
    const amt=Math.round(remaining*(pct/100));
    usedForPots+=amt;
    const fillMsg=p.target>0?' · '+Math.min(100,Math.round(p.current/p.target*100))+'% towards £'+fmt(p.target):'';
    const priLabel={'critical':'Critical','important':'Important','nice':'Nice to have'}[p.priority]||'';
    potItems.push({uid:'pot-'+p.id,name:p.name,color:p.color,suggested:amt,note:priLabel+' · suggested '+pct+'%'+fillMsg+' — tap to adjust',pot:p});
  });

  // Remainder after pots splits between personal pots + personal accounts
  const afterPots=Math.max(0,remaining-usedForPots);
  const nPersonalPots=personalPots.length; const nPersonalAccts=personalAccts.length;
  const nPersonal=nPersonalPots+nPersonalAccts;
  const perPersonal=nPersonal>0?Math.floor(afterPots/nPersonal):0;

  personalPots.forEach(p=>{
    potItems.push({uid:'pot-'+p.id,name:p.name,color:p.color,suggested:perPersonal,note:'Personal — equal share of what\'s left',pot:p});
  });

  potItems.sort((a,b)=>S.pots.findIndex(p=>p.id===a.pot.id)-S.pots.findIndex(p=>p.id===b.pot.id));

  const personalAcctItems=personalAccts.map(ac=>({
    uid:'acct-'+ac.id,name:ac.name,color:ac.color,suggested:perPersonal,note:'Personal — equal share of what\'s left',acct:ac
  }));

  const trueRemainder=Math.max(0,afterPots-perPersonal*nPersonal);
  return {net,acctItems,potItems,personalAcctItems,trueRemainder,monthlyBills,billsTarget,billsAcctBal,totalShortfall};
}

function allocRemainder() {
  const p=S.pending; if(!p) return 0;
  const r=smartAlloc(p.amount,p.costs||0);
  const getVal=uid=>_allocEdits[uid]!==undefined?Math.max(0,parseFloat(_allocEdits[uid])||0):0;
  let used=0;
  r.acctItems.forEach(i=>{ used+=_allocEdits[i.uid]!==undefined?getVal(i.uid):i.suggested; });
  r.potItems.forEach(i=>{ used+=_allocEdits[i.uid]!==undefined?getVal(i.uid):i.suggested; });
  r.personalAcctItems.forEach(i=>{ used+=_allocEdits[i.uid]!==undefined?getVal(i.uid):i.suggested; });
  return Math.max(0,r.net-used);
}

function updateAllocRemainder() {
  const el=document.getElementById('alloc-remainder');
  if (el) el.textContent='£'+fmt(allocRemainder());
}

function allocEdit(uid,val) {

function doConfirmAlloc(e){ rippleFrom(e.currentTarget,e); hapDbl(); confirmAlloc(); }
function confirmAlloc() {
  const p=S.pending; if(!p) return;
  const r=smartAlloc(p.amount,p.costs||0);
  if(!S.balanceUpdated) S.balanceUpdated={};
  const getAmt=uid=>_allocEdits[uid]!==undefined?Math.max(0,parseFloat(_allocEdits[uid])||0):null;
  // Apply to bills accounts
  r.acctItems.forEach(item=>{ const amt=getAmt(item.uid)??item.suggested; if(item.acct&&amt>0){item.acct.balance+=amt;S.balanceUpdated[item.acct.id]=td();} });
  // Apply to pots
  r.potItems.forEach(item=>{ const amt=getAmt(item.uid)??item.suggested; if(item.pot&&amt>0) item.pot.current+=amt; });
  // Apply to personal accounts
  r.personalAcctItems.forEach(item=>{ const amt=getAmt(item.uid)??item.suggested; if(item.acct&&amt>0){item.acct.balance+=amt;S.balanceUpdated[item.acct.id]=td();} });
  S.pending=null; renderAll(); go('home');
}

function go(name){
  hap(8);
  const prev=_curScreen; _curScreen=name;
  // Nav icon spring bounce
  const navEl=document.getElementById('nav-'+name);
  if(navEl){navEl.classList.remove('nb-bounce');void navEl.offsetWidth;navEl.classList.add('nb-bounce');setTimeout(()=>navEl.classList.remove('nb-bounce'),320);}
  // Nav active state
  document.querySelectorAll('.nb').forEach(n=>n.classList.remove('on'));
  if(navEl) navEl.classList.add('on');
  // No animation: same screen or reduced motion
  const allSc=()=>document.querySelectorAll('.sc');
  if(prev===name||_RM()){
    allSc().forEach(s=>s.classList.remove('on','sc-out','sc-in-r','sc-in-l'));
    document.getElementById('sc-'+name).classList.add('on');
    return;
  }
  const dir=NAV_ORDER.indexOf(name)>=NAV_ORDER.indexOf(prev)?'right':'left';
  const prevSc=document.getElementById('sc-'+prev);
  const nextSc=document.getElementById('sc-'+name);
  // All screens are position:absolute so they stack cleanly —
  // prev fades+scales back, next slides in on top. No bleed.
  allSc().forEach(s=>{if(s!==prevSc&&s!==nextSc)s.classList.remove('on','sc-out','sc-in-r','sc-in-l');});
  prevSc.classList.remove('sc-out','sc-in-r','sc-in-l'); prevSc.classList.add('sc-out');
  nextSc.classList.remove('sc-out','sc-in-r','sc-in-l'); nextSc.classList.add('on',dir==='right'?'sc-in-r':'sc-in-l');
  setTimeout(()=>{prevSc.classList.remove('on','sc-out');},300);
}

// ════════════════════════════════════════════
// ANIMATION SYSTEM — pure animation/haptic code
// No data, logic, or layout changes below
// ════════════════════════════════════════════

// ── Reduced motion helper ──
function _RM(){ return window.matchMedia('(prefers-reduced-motion:reduce)').matches; }

// ── Haptic feedback ──
function hap(pattern){
  if(_RM()) return;
  if(!navigator.vibrate) return;
  navigator.vibrate(pattern);
}
function hapDbl(){ hap([25,50,25]); }

// ── Global haptic delegation (chip/button = 12ms, nav handled in go()) ──
document.addEventListener('touchstart', function(e){
  if(_RM()) return;
  const t=e.target;
  if(t.closest('.chip,.icon-btn,.wchip,.tab,.toggle-opt') && !t.closest('.nb')){
    hap(12);
  }
}, {passive:true});

// ── Ripple ──
function rippleFrom(el, e){
  if(_RM()) return;
  const r=el.getBoundingClientRect();
  const x=(e&&e.touches?e.touches[0].clientX:e&&e.clientX!=null?e.clientX:r.left+r.width/2)-r.left;
  const y=(e&&e.touches?e.touches[0].clientY:e&&e.clientY!=null?e.clientY:r.top+r.height/2)-r.top;
  const sz=Math.max(r.width,r.height)*1.8;
  const rpl=document.createElement('div');
  rpl.className='hz-ripple';
  rpl.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(x-sz/2)+'px;top:'+(y-sz/2)+'px;background:rgba(255,255,255,.22);';
  el.appendChild(rpl);
  rpl.addEventListener('animationend',()=>rpl.remove(),{once:true});
}

// ── Shake + delete ──
function shakeAndDel(btn, fn){
  hapDbl();
  if(_RM()){ fn(); return; }
  const card=btn.closest('.glass,.glass-sm,.fwc');
  if(!card){ fn(); return; }
  card.classList.remove('hz-shake');
  void card.offsetWidth; // reflow to reset
  card.classList.add('hz-shake');
  card.addEventListener('animationend',()=>{ card.classList.remove('hz-shake'); fn(); },{once:true});
}

// ── Number roll animation ──
const _prevBals={};
function rollNum(el, from, to, dur){
  if(_RM()){ el.textContent='£'+Math.round(to).toLocaleString('en-GB'); return; }
  const start=performance.now();
  const diff=to-from;
  function step(now){
    const t=Math.min(1,(now-start)/dur);
    // ease out cubic
    const eased=1-Math.pow(1-t,3);
    el.textContent='£'+Math.round(from+diff*eased).toLocaleString('en-GB');
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function _animateBals(){
  if(_RM()) return;
  document.querySelectorAll('[data-roll-id]').forEach(el=>{
    const id=el.dataset.rollId;
    const to=parseFloat(el.dataset.rollVal)||0;
    const from=_prevBals[id]!==undefined?_prevBals[id]:to;
    if(Math.abs(to-from)>0.5) rollNum(el,from,to,400);
    _prevBals[id]=to;
  });
}

// ── Week detail row stagger ──
function _wStagger(det){
  if(_RM()) return;
  const rows=det.querySelectorAll('.wdrow');
  rows.forEach((r,i)=>{
    r.style.opacity='0';
    r.style.animation='none';
    // slight delay to let max-height transition start first
    setTimeout(()=>{
      r.style.opacity='';
      r.style.animation='wdrowIn 220ms ease '+(i*42)+'ms both';
    },40);
  });
}

// ── Home load sequence (fires once on first page open) ──
let _homeLoaded=false;
function _homeLoadSeq(){
  if(_homeLoaded||_RM()) return;
  _homeLoaded=true;
  // 1. Background fade in
  const bg=document.getElementById('bg');
  bg.style.opacity='0';
  bg.style.transition='opacity 500ms ease';
  requestAnimationFrame(()=>{ bg.style.opacity='1'; });
  // 2. Greeting slides in (150ms delay)
  const gr=document.getElementById('hgreeting');
  if(gr){
    gr.style.opacity='0';
    gr.style.transform='translateY(-10px)';
    gr.style.transition='opacity 380ms ease 150ms, transform 380ms cubic-bezier(.34,1.1,.64,1) 150ms';
    requestAnimationFrame(()=>{ gr.style.opacity='1'; gr.style.transform='translateY(0)'; });
  }
  // 3. Account strips cascade (300ms start, 60ms apart)
  setTimeout(()=>{
    document.querySelectorAll('#haccts .acct-strip').forEach((s,i)=>{
      s.style.opacity='0';
      s.style.transform='translateY(14px)';
      s.style.transition='opacity 300ms ease '+(i*60)+'ms, transform 300ms cubic-bezier(.34,1.1,.64,1) '+(i*60)+'ms';
      requestAnimationFrame(()=>{ s.style.opacity='1'; s.style.transform='translateY(0)'; });
    });
  },300);
  // 4. Week chips scale in (500ms start, 80ms apart)
  setTimeout(()=>{
    document.querySelectorAll('.wchip').forEach((c,i)=>{
      c.style.opacity='0';
      c.style.transform='scale(.88)';
      c.style.transition='opacity 280ms ease '+(i*80)+'ms, transform 280ms cubic-bezier(.34,1.56,.64,1) '+(i*80)+'ms';
      requestAnimationFrame(()=>{ c.style.opacity='1'; c.style.transform='scale(1)'; });
    });
  },500);
}
// Fire load sequence shortly after first render
setTimeout(_homeLoadSeq, 80);
</script>
